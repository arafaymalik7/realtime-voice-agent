<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voice Agent</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    #status.ok { color: green; }
    #status.err { color: red; }
    button { padding: 0.5rem 1.25rem; margin-right: 0.5rem; }
    #transcript { min-height: 8rem; border: 1px solid #ccc; border-radius: 4px; padding: 0.75rem; margin-top: 1rem; white-space: pre-wrap; }
    #latency { margin-top: 0.5rem; font-family: monospace; color: #555; }
  </style>
</head>
<body>
  <h1>Voice Agent</h1>
  <p>WebSocket: <span id="status" class="err">connecting…</span></p>
  <button id="start">Start</button>
  <button id="stop">Stop</button>
  <div id="transcript" aria-label="transcript"></div>
  <div id="latency">latency: —</div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
